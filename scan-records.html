<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanned QR Records</title>

<link rel="stylesheet" href="admin.css">

<style>

.actions{
    margin:20px 0;
}

.actions button{
    margin-right:10px;
    padding:10px 18px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#2e7d32;
    color:white;
}

tr:nth-child(even){
    background:#f9f9f9;
}

</style>

</head>

<body>

<div class="main">

<h1>Scanned QR Records</h1>

<div class="actions">

<button onclick="window.print()">
🖨 Print
</button>

<button onclick="exportCSV()">
📄 Export Excel
</button>

<button onclick="downloadPDF()">
📕 Export PDF
</button>

</div>

<table>

<thead>

<tr>

<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Cell Number</th>
<th>Email</th>
<th>Date</th>
<th>Time</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

let scans = JSON.parse(localStorage.getItem("scanRecords")) || [];

const table = document.getElementById("tableBody");

if(scans.length===0){

table.innerHTML=
`<tr>
<td colspan="7">No scanned records found.</td>
</tr>`;

}

scans.forEach((scan,index)=>{

table.innerHTML += `

<tr>

<td>${index+1}</td>

<td>${scan.name}</td>

<td>${scan.address}</td>

<td>${scan.cell}</td>

<td>${scan.email}</td>

<td>${scan.date}</td>

<td>${scan.time}</td>

</tr>

`;

});

function exportCSV(){

let csv="No,Name,Address,Cell Number,Email,Date,Time\n";

scans.forEach((scan,index)=>{

csv += `${index+1},"${scan.name}","${scan.address}","${scan.cell}","${scan.email}","${scan.date}","${scan.time}"\n`;

});

const blob=new Blob([csv],{type:"text/csv"});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="ScannedRecords.csv";

link.click();

}

function downloadPDF(){

window.print();

}

</script>

</body>

</html>
