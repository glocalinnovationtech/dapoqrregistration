<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code System Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#9dfaa5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

}

.login-box{

    width:380px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);

}

h2{

    text-align:center;
    margin-bottom:25px;
    color:#333;

}

label{

    display:block;
    margin-top:15px;
    font-weight:bold;

}

input{

    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;

}

button{

    width:100%;
    margin-top:25px;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#3082da;
    color:white;
    font-size:16px;
    cursor:pointer;

}

button:hover{

    background:#005dc0;

}

.error{

    color:red;
    text-align:center;
    margin-top:15px;

}

</style>

</head>

<body>

<div class="login-box">

<h2>QR Code Generator Login</h2>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<button onclick="login()">
Login
</button>

<p class="error" id="error"></p>

</div>

<script>

function login(){

    const username=document.getElementById("username").value;
    const password=document.getElementById("password").value;

    const adminUser="admin";
    const adminPass="admin1234";

    if(username===adminUser && password===adminPass){

        sessionStorage.setItem("loggedIn","true");

        window.location.href="index.html";

    }else{

        document.getElementById("error").innerHTML="Invalid Username or Password";

    }

}

</script>

</body>
</html>
