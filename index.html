<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator</title>

<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


</head>

<body>

<script>

if(sessionStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}

</script>

<div class="container">

<h2>QR Code Generator</h2>

<label>Name</label>
<input type="text" id="name">

<label>Address</label>
<textarea id="address" rows="3"></textarea>

<label>Cell Number</label>
<input
    type="text"
    id="cell"
    maxlength="11"
    inputmode="numeric"
    placeholder="09XXXXXXXXX"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<label>Email</label>
<input type="email" id="email">

<button onclick="generateQR()">
Generate QR Code
</button>

<a href="scanner.html" class="scan-btn">
    <i class="fa-solid fa-camera"></i>
    Scan QR Code
</a>

<button onclick="printQR()">
🖨 Print QR Code
</button>
    
<button onclick="window.location.href='records.html'">
View Records
</button>

<button onclick="window.location.href='admin.html'">
    ⚙ Admin Settings
    </button>
    
<button class="logout-btn" onclick="logout()">
Logout
</button>

<div class="output" id="output"></div>

<div id="qrcode"></div>

</div>

<script>

function generateQR(){

const name = document.getElementById("name").value.trim();
const address = document.getElementById("address").value.trim();
const cell = document.getElementById("cell").value.trim();
const email = document.getElementById("email").value.trim();

// Check if all fields are filled
if(!name || !address || !cell || !email){
    alert("Please complete all fields.");
    return;
}
function printQR(){

const qr = document.getElementById("qrcode");

if(qr.innerHTML === ""){
    alert("Please generate a QR Code first.");
    return;
}

let printWindow = window.open("", "", "width=500,height=600");

printWindow.document.write(`
    <html>
    <head>
        <title>Print QR Code</title>

        <style>
            body{
                text-align:center;
                font-family:Arial;
                margin-top:40px;
            }

            h2{
                margin-bottom:20px;
            }

            img,canvas{
                width:250px;
                height:250px;
            }
        </style>
    </head>

    <body>

        <h2>Generated QR Code</h2>

        ${qr.innerHTML}

    </body>

    </html>
`);

printWindow.document.close();

printWindow.focus();

printWindow.print();

printWindow.close();

}
// Validate Philippine mobile number
const phonePattern = /^09\d{9}$/;

if(!phonePattern.test(cell)){
    alert("Cell Number must be a valid 11-digit Philippine mobile number.\n\nExample: 09171234567");
    document.getElementById("cell").focus();
    return;
}

// Validate email
const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(email)){
    alert("Please enter a valid email address.");
    document.getElementById("email").focus();
    return;
}

// QR data
const qrData =
`Name: ${name}
Address: ${address}
Cell: ${cell}
Email: ${email}`;

// Show information
document.getElementById("output").textContent = qrData;

// Remove old QR
document.getElementById("qrcode").innerHTML = "";

// Generate new QR
new QRCode(document.getElementById("qrcode"),{
    text: qrData,
    width:250,
    height:250
});

// Save record
let records = JSON.parse(localStorage.getItem("qrRecords")) || [];

const now = new Date();

// Format the date
const formattedDate = now.toLocaleDateString("en-US", {
    year: "numeric",
    month: "long",
    day: "numeric"
});

// Format the time
const formattedTime = now.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
});

// Save the record
records.push({
    name: name,
    address: address,
    cell: cell,
    email: email,
    date: formattedDate,
    time: formattedTime
});



localStorage.setItem("qrRecords", JSON.stringify(records));

// Success message
alert("QR Code generated successfully!\n\nThe information has been saved.");

// Clear form fields
document.getElementById("name").value = "";
document.getElementById("address").value = "";
document.getElementById("cell").value = "";
document.getElementById("email").value = "";

// Focus back to the first field
document.getElementById("name").focus();

} // <-- End of generateQR()

// Logout function
function logout(){

    if(confirm("Are you sure you want to logout?")){

        sessionStorage.removeItem("loggedIn");

        window.location.href = "login.html";

    }

}

</script>

</body>
</html>
